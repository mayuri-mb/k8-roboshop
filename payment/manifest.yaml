apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: payment
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: payment  
    spec:
      containers:
        - name: payment
          image: mayurim334/payment:1.4.0
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: payment  
spec:
  selector:
    project: roboshop
    tier: backend
    component: payment   
  ports:
   -  protocol: TCP
      port: 8080
      targetPort: 8080               


